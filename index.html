<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e110a">
<title>Cancionero - Compañero de Escenario</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Playfair+Display:ital,wght@0,500;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
  /* ===================== PALETA DE COLORES APK ORIGINAL ===================== */
  :root {
    --bg-main: #1e110a;       
    --card-cancionero: #42210b; 
    --card-shows: #1e112a;      
    --btn-bordo: #7a221e;      
    --text-dorado: #e2c285;    
    --text-blanco: #f4eae1;    
    --text-muted: #a68b7c;     
    --chord-color: #64b5f6;    
    --border-color: rgba(226, 194, 133, 0.15);
    
    --font-titulos: 'Cinzel', serif;
    --font-letras: 'Playfair Display', serif;
    --font-ui: 'Plus Jakarta Sans', sans-serif;
    --transition: 0.2s cubic-bezier(.4,0,.2,1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg-main);
    color: var(--text-blanco);
    font-family: var(--font-ui);
    -webkit-tap-highlight-color: transparent;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    position: relative;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    padding: 16px;
    background: var(--bg-main);
    min-height: 60px;
    flex-shrink: 0;
  }

  .back-btn {
    background: none;
    border: none;
    color: var(--text-blanco);
    font-size: 1.5rem;
    cursor: pointer;
    margin-right: 14px;
    display: none;
  }

  .header-title-container {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
  }

  .header-title {
    font-family: var(--font-titulos);
    font-weight: 700;
    font-size: 1.3rem;
    color: var(--text-dorado);
  }

  .add-song-icon-btn {
    background: none;
    border: none;
    color: var(--text-dorado);
    font-size: 1.6rem;
    cursor: pointer;
    display: none;
  }

  /* CONTENEDOR DE PANTALLAS */
  .screen {
    display: none;
    flex: 1;
    flex-direction: column;
    overflow: hidden;
  }
  .screen.active { display: flex; }
  
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    -webkit-overflow-scrolling: touch;
  }

  /* PANTALLA 1: MENU PRINCIPAL */
  .main-menu-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 24px;
    gap: 24px;
    max-width: 650px;
  }

  .brand-box {
    text-align: center;
    margin-bottom: 20px;
  }

  .brand-guitar {
    font-size: 3.5rem;
    margin-bottom: 12px;
    display: block;
  }

  .brand-title {
    font-family: var(--font-titulos);
    font-size: 2.2rem;
    font-weight: 700;
    color: var(--text-dorado);
    letter-spacing: 1px;
  }

  .brand-subtitle {
    font-size: 0.9rem;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .menu-card {
    width: 100%;
    max-width: 400px;
    padding: 24px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    border: 1px solid rgba(226, 194, 133, 0.1);
    transition: transform var(--transition);
    position: relative;
  }
  .menu-card:active { transform: scale(0.98); }

  .menu-card.cancionero-btn { background: var(--card-cancionero); }
  .menu-card.shows-btn { background: var(--card-shows); }

  .menu-card-icon { font-size: 2rem; opacity: 0.8; }
  .menu-card-text { flex: 1; }
  
  .menu-card-title {
    font-family: var(--font-titulos);
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--text-blanco);
  }

  .menu-card-desc {
    font-size: 0.8rem;
    color: rgba(244, 234, 225, 0.7);
    margin-top: 2px;
  }

  .menu-card-arrow { color: var(--text-dorado); font-size: 1.2rem; }
  .footer-text { margin-top: auto; font-size: 0.8rem; color: var(--text-muted); letter-spacing: 1px; padding-bottom: 10px; }

  /* PANTALLA 2: PESTAÑAS HORIZONTALES */
  .tabs-wrapper {
    overflow-x: auto;
    background: var(--bg-main);
    border-bottom: 1px solid var(--border-color);
    flex-shrink: 0;
  }
  .tabs-wrapper::-webkit-scrollbar { display: none; }

  .tabs-container {
    display: flex;
    padding: 0 8px;
    min-width: max-content;
  }

  .tab-item {
    padding: 14px 16px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: var(--font-ui);
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    position: relative;
    transition: color var(--transition);
  }

  .tab-item.active { color: var(--text-dorado); }
  .tab-item.active::after {
    content: '';
    position: absolute;
    bottom: 0; left: 16px; right: 16px;
    height: 3px;
    background: var(--text-dorado);
    border-radius: 4px 4px 0 0;
  }

  /* LISTA DE CANCIONES */
  .search-container { padding: 12px 16px; background: rgba(0,0,0,0.15); }
  .search-box {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text-blanco);
    font-family: var(--font-ui);
    font-size: 0.95rem;
    outline: none;
  }

  .song-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 8px;
    border-bottom: 1px solid rgba(226, 194, 133, 0.08);
    cursor: pointer;
  }
  .song-row:active { background: rgba(255,255,255,0.02); }

  .song-avatar {
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--card-cancionero);
    color: var(--text-dorado);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-titulos); font-weight: 700; font-size: 1.1rem;
    border: 1px solid rgba(226, 194, 133, 0.2);
  }

  .song-meta-info { flex: 1; min-width: 0; }
  .song-row-title { font-weight: 600; font-size: 1rem; color: var(--text-blanco); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .song-row-sub { font-size: 0.8rem; color: var(--text-muted); margin-top: 3px; }
  .action-icons-wrap { display: flex; gap: 12px; align-items: center; }

  .delete-btn { background: none; border: none; color: #b33939; font-size: 1.1rem; cursor: pointer; padding: 4px; }
  .add-to-show-btn {
    background: none; border: none; color: var(--text-dorado);
    font-size: 0.8rem; font-weight: 700; border: 1px solid var(--text-dorado);
    padding: 4px 8px; border-radius: 6px; cursor: pointer;
  }
  .add-to-show-btn.added { background: var(--text-dorado); color: var(--bg-main); }

  /* FORMULARIO NUEVA CANCION */
  .peña-form { display: flex; flex-direction: column; gap: 16px; max-width: 500px; margin: 0 auto; width: 100%; }
  .peña-group { display: flex; flex-direction: column; gap: 6px; }
  .peña-label { font-size: 0.8rem; font-weight: 600; color: var(--text-dorado); letter-spacing: 0.5px; }
  .peña-input, .peña-select, .peña-textarea {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(226, 194, 133, 0.2);
    border-radius: 10px; padding: 12px; color: var(--text-blanco); font-family: var(--font-ui); font-size: 0.95rem; outline: none;
  }
  .peña-textarea { font-family: var(--font-letras); font-size: 1.05rem; min-height: 200px; line-height: 1.6; }
  .peña-submit-btn {
    background: var(--btn-bordo); color: var(--text-blanco); border: none;
    padding: 16px; border-radius: 12px; font-family: var(--font-ui); font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 10px;
  }

  /* REPERTORIO DEL SHOW */
  .start-show-action-btn {
    width: 100%; padding: 16px; background: var(--btn-bordo); color: var(--text-blanco); border: none;
    border-radius: 12px; font-family: var(--font-ui); font-weight: 700; font-size: 1rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 16px;
  }

  /* VIVO INDIVIDUAL */
  #live-player-mode { position: fixed; inset: 0; z-index: 200; background: var(--bg-main); display: none; flex-direction: column; }
  #live-player-mode.active { display: flex; }
  .live-player-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--border-color); background: rgba(0,0,0,0.2); }
  .live-player-meta { text-align: center; flex: 1; min-width: 0; padding: 0 10px; }
  .live-player-title { font-family: var(--font-titulos); font-size: 1.1rem; color: var(--text-dorado); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .live-player-subtitle { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }

  .live-player-controls-bar { display: flex; align-items: center; gap: 8px; padding: 10px 16px; background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border-color); }
  .live-ctrl-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(226, 194, 133, 0.2); color: var(--text-blanco); padding: 6px 12px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }

  .live-scroll-view { flex: 1; overflow-y: auto; padding: 24px 20px 140px; -webkit-overflow-scrolling: touch; }
  .lyrics-render-box { font-family: var(--font-letras); font-size: 1.2rem; line-height: 2.1; white-space: pre-wrap; color: var(--text-blanco); }
  .lyrics-render-box .chord { color: var(--chord-color); font-weight: 700; font-family: var(--font-ui); font-size: 1.05rem; display: inline-block; margin-top: -0.4em; vertical-align: middle; }

  .live-footer-nav { position: absolute; bottom: 0; left: 0; right: 0; padding: 16px; display: flex; align-items: center; justify-content: space-between; background: linear-gradient(to top, var(--bg-main) 70%, transparent); }
  .nav-circle-btn { width: 48px; height: 48px; border-radius: 50%; background: var(--card-cancionero); border: 1px solid var(--text-dorado); color: var(--text-dorado); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; }
  .nav-circle-btn.next-song { background: var(--text-dorado); color: var(--bg-main); }
  .nav-circle-btn.disabled { opacity: 0.2; pointer-events: none; }

  .empty-peña { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 0.9rem; }
  .toast-peña { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--btn-bordo); color: white; padding: 10px 20px; border-radius: 30px; font-size: 0.85rem; z-index: 500; display: none; }
  
/* --- OPTIMIZACIÓN PARA PANTALLAS GRANDES (TABLETS) --- */
@media (min-width: 900px) {
  .main-menu-container {
    padding: 60px;
  }
  .brand-title {
    font-size: 3rem;
  }
  .menu-card {
    max-width: 700px;
    padding: 30px;
  }
  .song-row {
    padding: 22px;
  }
  .lyrics-render-box {
    font-size: 1.6rem;
  }
}
</style>
</head>
<body>

<div id="app">
  <header class="header">
    <button class="back-btn" id="global-back-btn" onclick="navigateBack()">←</button>
    <div class="header-title-container">
      <span class="header-title" id="main-header-title">Cancionero</span>
    </div>
    <button class="add-song-icon-btn" id="header-add-btn" onclick="navigateTo('screen-add-song')">+</button>
  </header>

  <main class="screen active" id="screen-main-menu">
    <div class="main-menu-container">
      <div class="brand-box">
        <span class="brand-guitar">🎸</span>
        <h1 class="brand-title">Cancionero</h1>
        <p class="brand-subtitle">Tu compañero en el escenario</p>
      </div>

      <div class="menu-card cancionero-btn" onclick="openCancioneroView()">
        <span class="menu-card-icon">🪘</span>
        <div class="menu-card-text">
          <h2 class="menu-card-title">Cancionero</h2>
          <p class="menu-card-desc">Todas tus canciones por género</p>
        </div>
        <span class="menu-card-arrow">&gt;</span>
      </div>

      <div class="menu-card shows-btn" onclick="openShowsView()">
        <span class="menu-card-icon">🎤</span>
        <div class="menu-card-text">
          <h2 class="menu-card-title">Shows en vivo</h2>
          <p class="menu-card-desc">Armá el repertorio para tu próximo show</p>
        </div>
        <span class="menu-card-arrow">&gt;</span>
      </div>

      <p class="footer-text">Folklore Argentino 🌿</p>
    </div>
  </main>

  <section class="screen" id="screen-cancionero-list">
    <div class="tabs-wrapper">
      <div class="tabs-container">
        <button class="tab-item active" onclick="filterByGenre('chacarera')">🪘 Chacareras</button>
        <button class="tab-item" onclick="filterByGenre('zamba')">🌸 Zambas</button>
        <button class="tab-item" onclick="filterByGenre('escondido')">🎭 Escondidos</button>
        <button class="tab-item" onclick="filterByGenre('gato')">🐱 Gatos</button>
        <button class="tab-item" onclick="filterByGenre('chamame')">🪗 Chamamés</button>
        <button class="tab-item" onclick="filterByGenre('otros')">✨ Otros</button>
      </div>
    </div>
    <div class="search-container">
      <input type="text" class="search-box" id="search-input" placeholder="Buscar canción por título..." oninput="renderSongs()">
    </div>
    <div class="scroll-area">
      <div id="songs-render-target"></div>
    </div>
  </section>

  <section class="screen" id="screen-add-song">
    <div class="scroll-area">
      <form class="peña-form" onsubmit="handleFormSubmit(event)">
        <h2 class="brand-title" id="song-form-title" style="font-size:1.5rem;text-align:center;">Nueva canción</h2>
        
        <div class="peña-group">
          <label class="peña-label">Título *</label>
          <input type="text" id="form-title" class="peña-input" required placeholder="Ej: Chacarera del Rancho">
        </div>

        <div class="peña-group">
          <label class="peña-label">Estilo / Género *</label>
          <select id="form-genre" class="peña-select" required>
            <option value="chacarera">Chacarera</option>
            <option value="zamba">Zamba</option>
            <option value="escondido">Escondido</option>
            <option value="gato">Gato</option>
            <option value="chamame">Chamame</option>
            <option value="otros">Otros</option>
          </select>
        </div>

        <div class="peña-group">
          <label class="peña-label">Tonalidad *</label>
          <input type="text" id="form-key" class="peña-input" required placeholder="Ej: Am, Sol Mayor">
        </div>

        <div class="peña-group">
          <label class="peña-label">BPM *</label>
          <input type="number" id="form-bpm" class="peña-input" required value="90">
        </div>

        <div class="peña-group">
          <label class="peña-label">Letra (Escribí los acordes entre corchetes, ej: [Am])</label>
          <textarea id="form-lyrics" class="peña-textarea" placeholder="[Am] Cuando salí de Santiago [E7] todo el camino lloré..."></textarea>
        </div>

        <button type="submit" id="song-submit-btn" class="peña-submit-btn">Guardar canción</button>
      </form>
    </div>
  </section>

  <section class="screen" id="screen-shows-repertoire">
    <div class="scroll-area">
      <button class="start-show-action-btn" onclick="startLiveShow()">🚀 Iniciar Show en Vivo</button>
      <h3 class="peña-label" style="margin-bottom: 12px;">Lista de temas seleccionados:</h3>
      <div id="show-repertoire-target"></div>
    </div>
  </section>
</div>

<div id="live-player-mode">
  <div class="live-player-header">
    <button class="live-ctrl-btn" onclick="exitLiveShow()">Salir</button>
    <div class="live-player-meta">
      <div class="live-player-title" id="live-meta-title">Título de la Canción</div>
      <div class="live-player-subtitle" id="live-meta-sub">Género • Tonalidad • BPM</div>
    </div>
    <button class="live-ctrl-btn" onclick="resetLiveScroll()">Reiniciar</button>
  </div>

  <div class="live-player-controls-bar">
    <span>Letra:</span>
    <button class="live-ctrl-btn" onclick="adjustFontSize(-2)">A-</button>
    <button class="live-ctrl-btn" onclick="adjustFontSize(2)">A+</button>
    <div style="width: 10px;"></div>
    <span>Scroll:</span>
    <button class="live-ctrl-btn" id="scroll-play-btn" onclick="toggleAutoscroll()">Play ▶</button>
    <button class="live-ctrl-btn" onclick="adjustScrollSpeed(-1)">Vel -</button>
    <button class="live-ctrl-btn" onclick="adjustScrollSpeed(1)">Vel +</button>
  </div>

  <div class="live-scroll-view" id="live-scroll-area">
    <pre class="lyrics-render-box" id="lyrics-render-target"></pre>
  </div>

  <div class="live-footer-nav">
    <button class="nav-circle-btn" id="live-prev-btn" onclick="changeLiveSong(-1)">⏮</button>
    <button class="nav-circle-btn" onclick="toggleAutoscroll()" id="center-play-trigger" style="font-size:1.5rem;">▶</button>
    <button class="nav-circle-btn next-song" id="live-next-btn" onclick="changeLiveSong(1)">⏭</button>
  </div>
</div>

<div class="toast-peña" id="toast-msg"></div>

<script>
  /* ===================== CONFIGURACIÓN REAL DE FIREBASE ===================== */
  const firebaseConfig = {
    apiKey: "AIzaSyCDW6qQeYPSBvKXyVil0Y4TFjBETLszJao",
    authDomain: "cancionerointeractivo.firebaseapp.com",
    projectId: "cancionerointeractivo",
    storageBucket: "cancionerointeractivo.firebasestorage.app",
    messagingSenderId: "522780296914",
    appId: "1:522780296914:web:0b99e4fa3ec9c780ebcf0b"
  };

  // Inicializar Firebase y Cloud Firestore
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  /* ===================== ESTADO DE LA APLICACIÓN ===================== */
  let songsArray = [];
  let currentGenreFilter = 'chacarera';
  let showSetlistIds = [];
  let screenHistory = ['screen-main-menu'];

  // ===== MODO EDICIÓN =====
  let editingSongId = null;
  let editingSongData = null;
  
  // Control de Vivo
  let currentLiveIndex = 0;
  let isAutoscrolling = false;
  let autoscrollInterval = null;
  let scrollSpeed = 22; 
  let currentFontSize = 20;
  let triggerNextOnNextScroll = false;

  /* ===================== NAVEGACIÓN ===================== */
  function showScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const activeScreen = document.getElementById(screenId);
    if(activeScreen) activeScreen.classList.add('active');
    
    const backBtn = document.getElementById('global-back-btn');
    const addBtn = document.getElementById('header-add-btn');
    const headerTitle = document.getElementById('main-header-title');

    if (screenId === 'screen-main-menu') {
      backBtn.style.display = 'none';
      addBtn.style.display = 'none';
      headerTitle.innerText = "Cancionero";
    } else {
      backBtn.style.display = 'block';
      if (screenId === 'screen-cancionero-list') {
        addBtn.style.display = 'block';
        headerTitle.innerText = "Cancionero";
      } else if (screenId === 'screen-add-song') {
        addBtn.style.display = 'none';
        headerTitle.innerText = "Nueva Canción";
      } else if (screenId === 'screen-shows-repertoire') {
        addBtn.style.display = 'none';
        headerTitle.innerText = "Shows en Vivo";
      }
    }
  }

  function navigateTo(screenId) {
    if (screenHistory[screenHistory.length - 1] !== screenId) {
      screenHistory.push(screenId);
    }
    showScreen(screenId);
  }

  function navigateBack() {
    if (screenHistory.length > 1) {
      screenHistory.pop();
      const prevScreen = screenHistory[screenHistory.length - 1];
      showScreen(prevScreen);
    }
  }

  function openCancioneroView() { navigateTo('screen-cancionero-list'); renderSongs(); }
  function openShowsView() { navigateTo('screen-shows-repertoire'); renderShowRepertoire(); }

  /* ===================== CONEXIÓN EN TIEMPO REAL CON CLOUD FIRESTORE ===================== */
  // Escuchamos la colección "Canciones" con C mayúscula
  db.collection('Canciones').onSnapshot((snapshot) => {
    songsArray = [];
    snapshot.forEach((doc) => {
      const data = doc.data();
      // Mapeamos los campos en minúscula de Firestore a la app local de forma segura
      songsArray.push({
        id: doc.id,
        title: data.titulo || 'Sin título',
        genre: (data.estilo || 'otros').toLowerCase(),
        key: data.tonalidad || 'Am', // Soporta si tenés o agregás este campo
        bpm: data.bpm || 90,
        lyrics: data.letra || ''
      });
    });
    renderSongs();
    renderShowRepertoire();
  }, (error) => {
    console.error("Error cargando Firestore: ", error);
  });

  /* ===================== RENDERS INTERFAZ ===================== */
  function filterByGenre(genre) {
    currentGenreFilter = genre.toLowerCase();
    document.querySelectorAll('.tab-item').forEach(btn => {
      if(btn.onclick.toString().includes(`'${genre}'`)) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });
    renderSongs();
  }

  function renderSongs() {
    const target = document.getElementById('songs-render-target');
    if(!target) return;
    const searchVal = document.getElementById('search-input').value.toLowerCase();
    
    const filtered = songsArray.filter(s => {
      const matchesGenre = s.genre === currentGenreFilter;
      const matchesSearch = s.title.toLowerCase().includes(searchVal);
      return matchesGenre && matchesSearch;
    });

    if (filtered.length === 0) {
      target.innerHTML = `<div class="empty-peña">🎵 No hay canciones en este género todavía.<br>Tocá el + para agregar una.</div>`;
      return;
    }

    target.innerHTML = filtered.map(song => {
      const isAdded = showSetlistIds.includes(song.id);
      return `
        <div class="song-row">
          <div class="song-avatar" onclick="quickViewSong('${song.id}')">${song.title.charAt(0).toUpperCase()}</div>
          <div class="song-meta-info" onclick="quickViewSong('${song.id}')">
            <div class="song-row-title">${song.title}</div>
            <div class="song-row-sub">${song.key} • ${song.bpm} BPM</div>
          </div>
<div class="action-icons-wrap">

  <button 
    class="add-to-show-btn ${isAdded ? 'added' : ''}"
    onclick="toggleSongInSetlist('${song.id}')">
    
    ${isAdded ? '✓ Show' : '+ Show'}
    
  </button>

  <button 
    class="delete-btn"
    style="color:#4da3ff"
    onclick="editSong('${song.id}')">
    
    ✏️
    
  </button>

  <button 
    class="delete-btn"
    onclick="deleteSong('${song.id}')">
    
    🗑️
    
  </button>

</div>
        </div>
      `;
    }).join('');
  }

  function renderShowRepertoire() {
    const target = document.getElementById('show-repertoire-target');
    if(!target) return;
    const selectedSongs = songsArray.filter(s => showSetlistIds.includes(s.id));

    if (selectedSongs.length === 0) {
      target.innerHTML = `<div class="empty-peña">🎤 No armaste ningún repertorio todavía.<br>Andá al Cancionero y sumá temas al show.</div>`;
      return;
    }

    target.innerHTML = selectedSongs.map((song, idx) => `
      <div class="song-row">
        <div class="song-avatar" style="background: var(--card-shows);">${idx + 1}</div>
        <div class="song-meta-info">
          <div class="song-row-title">${song.title}</div>
          <div class="song-row-sub">${song.genre.toUpperCase()} • ${song.key}</div>
        </div>
        <button class="delete-btn" onclick="toggleSongInSetlist('${song.id}')" style="color:var(--text-dorado)">Quitar</button>
      </div>
    `).join('');
  }

  function toggleSongInSetlist(id) {
    const index = showSetlistIds.indexOf(id);
    if (index > -1) {
      showSetlistIds.splice(index, 1);
    } else {
      showSetlistIds.push(id);
    }
    renderSongs();
    renderShowRepertoire();
  }

  function handleFormSubmit(e) {
    e.preventDefault();
    
    // Guardamos respetando exactamente tus campos en minúscula de Firestore
    const newSong = {
      titulo: document.getElementById('form-title').value,
      estilo: document.getElementById('form-genre').value,
      tonalidad: document.getElementById('form-key').value,
      bpm: parseInt(document.getElementById('form-bpm').value) || 90,
      letra: document.getElementById('form-lyrics').value,
      id_cancion: ""
    };

    db.collection('Canciones').add(newSong)
      .then(() => {
        showToast("¡Canción guardada en Firestore!");
        e.target.reset();
        navigateBack();
      })
      .catch(err => showToast("Error al guardar: " + err.message));
  }

  function deleteSong(id) {
    if(confirm("¿Seguro que querés borrar esta canción, paisano?")) {
      db.collection('Canciones').doc(id).delete()
        .then(() => showToast("Canción eliminada de la nube"));
    }
  }

  /* ===================== MOTOR SHOW EN VIVO ===================== */
  function startLiveShow() {
    if (showSetlistIds.length === 0) {
      showToast("Agregá canciones al show primero");
      return;
    }
    currentLiveIndex = 0;
    document.getElementById('live-player-mode').classList.add('active');
    loadLiveSong();
  }

  // Cierre seguro del Vivo
  function exitLiveShow() {
    stopAutoscroll();
    document.getElementById('live-player-mode').classList.remove('active');
  }

  function quickViewSong(id) {
    showSetlistIds = [id];
    currentLiveIndex = 0;
    document.getElementById('live-player-mode').classList.add('active');
    loadLiveSong();
  }

  function loadLiveSong() {
    const selectedSongs = songsArray.filter(s => showSetlistIds.includes(s.id));
    const song = selectedSongs[currentLiveIndex];
    if (!song) return;

    document.getElementById('live-meta-title').innerText = song.title;
    document.getElementById('live-meta-sub').innerText = `${song.genre.toUpperCase()} • Tonalidad: ${song.key} • ${song.bpm} BPM`;

    // Renderizado de acordes [Am]
    const processedLyrics = song.lyrics.replace(/\[([^\]]+)\]/g, '<span class="chord">$1</span>');
    const target = document.getElementById('lyrics-render-target');
    target.innerHTML = processedLyrics;
    target.style.fontSize = `${currentFontSize}px`;

    document.getElementById('live-prev-btn').classList.toggle('disabled', currentLiveIndex === 0);
    document.getElementById('live-next-btn').classList.toggle('disabled', currentLiveIndex === selectedSongs.length - 1);

    triggerNextOnNextScroll = false;
    resetLiveScroll();
  }

  function changeLiveSong(direction) {
    const selectedSongs = songsArray.filter(s => showSetlistIds.includes(s.id));
    const nextIndex = currentLiveIndex + direction;
    if (nextIndex >= 0 && nextIndex < selectedSongs.length) {
      currentLiveIndex = nextIndex;
      loadLiveSong();
    } else if (nextIndex >= selectedSongs.length) {
      showToast("¡Fin del show!");
      exitLiveShow();
    }
  }

  function toggleAutoscroll() {
    if (isAutoscrolling) { stopAutoscroll(); } else { startAutoscroll(); }
  }

  function startAutoscroll() {
    isAutoscrolling = true;
    document.getElementById('scroll-play-btn').innerText = "Pausa ⏸";
    document.getElementById('center-play-trigger').innerText = "⏸";
    
    const container = document.getElementById('live-scroll-area');
    autoscrollInterval = setInterval(() => {
      container.scrollTop += 1;
      if (container.scrollTop >= (container.scrollHeight - container.clientHeight - 2)) {
        stopAutoscroll();
        setTimeout(() => { changeLiveSong(1); }, 800);
      }
    }, scrollSpeed);
  }

  function stopAutoscroll() {
    isAutoscrolling = false;
    document.getElementById('scroll-play-btn').innerText = "Play ▶";
    document.getElementById('center-play-trigger').innerText = "▶";
    clearInterval(autoscrollInterval);
  }

  function resetLiveScroll() {
    stopAutoscroll();
    document.getElementById('live-scroll-area').scrollTop = 0;
  }

  /* DETECTAR SCROLL MANUAL */
  document.getElementById('live-scroll-area').addEventListener('scroll', function(e) {
    const el = e.target;
    if (el.scrollTop >= (el.scrollHeight - el.clientHeight - 5)) {
      if (!isAutoscrolling) { 
        if (!triggerNextOnNextScroll) triggerNextOnNextScroll = true;
      }
    }
  });

  document.getElementById('live-scroll-area').addEventListener('wheel', function(e) {
    if (triggerNextOnNextScroll && e.deltaY > 0) {
      triggerNextOnNextScroll = false;
      changeLiveSong(1);
    }
  });

  document.getElementById('live-scroll-area').addEventListener('touchend', function(e) {
    const el = e.currentTarget;
    if (el.scrollTop >= (el.scrollHeight - el.clientHeight - 5)) {
      if(triggerNextOnNextScroll) {
        triggerNextOnNextScroll = false;
        changeLiveSong(1);
      } else {
        triggerNextOnNextScroll = true;
      }
    }
  });

  function adjustScrollSpeed(delta) {
    scrollSpeed = Math.max(5, scrollSpeed - (delta * 3));
    if (isAutoscrolling) { stopAutoscroll(); startAutoscroll(); }
  }

  function adjustFontSize(delta) {
    currentFontSize = Math.max(12, Math.min(36, currentFontSize + delta));
    document.getElementById('lyrics-render-target').style.fontSize = `${currentFontSize}px`;
  }

  function editSong(id){
  editingSongId = id;
  editingSongData = songsArray.find(s => s.id === id);
  
  if(!editingSongData){
    showToast("No se encontró la canción");
    return;
  }
  
  document.getElementById("form-title").value = editingSongData.title;
  document.getElementById("form-genre").value = editingSongData.genre;
  document.getElementById("form-key").value = editingSongData.key;
  document.getElementById("form-bpm").value = editingSongData.bpm;
  document.getElementById("form-lyrics").value = editingSongData.lyrics;
  
  document.getElementById("song-form-title").innerText = "Editar canción";
  document.getElementById("song-submit-btn").innerText = "Guardar cambios";
  
  navigateTo("screen-add-song");
}
  
  function showToast(msg) {
    const toast = document.getElementById('toast-msg');
    if(!toast) return;
    toast.innerText = msg;
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 2500);
  }
</script>

<script>
if ("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker.js");
}
</script>
  
</body>
</html>
