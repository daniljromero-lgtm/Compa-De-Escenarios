<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compa de Escenarios - Cancionero</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Compa de Escenarios</h1>
        </header>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Buscar por título, género o letra...">
        </div>

        <div id="songsList" class="songs-list">
            <p style="text-align: center; color: var(--text-muted);">Cargando canciones peñeras...</p>
        </div>
    </div>

    <button id="btnOpenForm" class="btn-floating">+</button>

    <div id="formOverlay" class="form-overlay">
        <div class="form-container">
            <h2 id="formTitle">Agregar nueva canción</h2>
            <form id="songForm">
                
                <div class="form-group">
                    <label for="songTitle">Título de la canción</label>
                    <input type="text" id="songTitle" required placeholder="Ej: La Pochi Pacha">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="songGenre">Género</label>
                        <select id="songGenre">
                            <option value="Chacarera">Chacarera</option>
                            <option value="Zamba">Zamba</option>
                            <option value="Escondido">Escondido</option>
                            <option value="Gato">Gato</option>
                            <option value="Huayno">Huayno</option>
                            <option value="Chamame">Chamamé</option>
                            <option value="Otro">Otro/Particular</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="songKey">Tonalidad / Acorde inicial</label>
                        <input type="text" id="songKey" placeholder="Ej: Mi menor (Em)">
                    </div>
                    <div class="form-group">
                        <label for="songBpm">BPM (Ritmo)</label>
                        <input type="number" id="songBpm" placeholder="Ej: 120">
                    </div>
                </div>

                <div class="form-group">
                    <label for="songLyrics">Letra y Acordes</label>
                    <textarea id="songLyrics" rows="10" required placeholder="Pegá la letra acá..."></textarea>
                </div>

                <div class="form-buttons">
                    <button type="button" id="btnCancelForm" class="btn btn-secondary">Cancelar</button>
                    <button type="submit" id="btnSubmitForm" class="btn btn-primary">Guardar Canción</button>
                </div>

            </form>
        </div>
    </div>

        };
    </script>

    <script type="module" src="js/app.js"></script>

</body>
</html>
